  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark:  #1e1612;
      --cream: #f0e8db;
      --warm:  #c9b49a;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .ornament {
      font-size: 1.4rem;
      color: var(--warm);
      opacity: 0.7;
      margin-bottom: 1.8rem;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.9; transform: scale(1.1); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    h1 em { font-style: italic; color: var(--warm); }

    p {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--warm);
      letter-spacing: 0.05em;
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--warm);
      opacity: 0.4;
      margin: 1.5rem auto 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border: 1px solid rgba(201,180,154,0.5);
      color: var(--cream);
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }

    .btn:hover {
      background: var(--warm);
      color: var(--dark);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--warm);
      opacity: 0.4;
      text-transform: uppercase;
    }
